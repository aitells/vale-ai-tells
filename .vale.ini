StylesPath = styles
MinAlertLevel = suggestion
Vocab = ai-tells

Packages = Google, write-good, proselint

[*.md]
BasedOnStyles = Google, write-good, proselint, ai-tells

[test-document.md]
BasedOnStyles = ai-tells, ai-tells-experimental

[test-false-positives.md]
BasedOnStyles = ai-tells, ai-tells-experimental

[test-commit-messages.md]
BasedOnStyles = ai-tells-commits

[formats]
COMMIT_EDITMSG = md

[{COMMIT_EDITMSG,.git/COMMIT_EDITMSG}]
BasedOnStyles = ai-tells, ai-tells-commits
