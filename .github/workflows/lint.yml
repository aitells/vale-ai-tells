---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install tools
        run: |
          pip install yamllint
          npm install -g cspell
          brew install vale rumdl

      - name: Lint YAML
        run: yamllint --strict .

      - name: Check spelling
        run: cspell .

      - name: Lint Markdown
        run: rumdl check .

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@e01d1ea33dd6a5ed517d95b4c0c357560ac6f518 # v2

      - name: Sync Vale packages
        run: vale sync

      - name: Lint prose
        run: vale --glob='!test-*.md' --minAlertLevel=error .
