---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create packages
        run: |
          cd styles

          # ai-tells and ai-tells-commits are style-only packages (flat zip)
          zip -r ../ai-tells.zip ai-tells
          zip -r ../ai-tells-commits.zip ai-tells-commits

          # ai-tells-experimental includes Tengo scripts and vocabularies
          # in config/. Vale's package sync expects a top-level dir wrapping
          # a styles/ subtree so it can merge into StylesPath.
          cd ..
          mkdir -p pkg/ai-tells-experimental/styles
          cp -r styles/ai-tells-experimental pkg/ai-tells-experimental/styles/
          cp -r styles/config pkg/ai-tells-experimental/styles/
          cd pkg && zip -r ../ai-tells-experimental.zip ai-tells-experimental

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-tells.zip
            ai-tells-commits.zip
            ai-tells-experimental.zip
          generate_release_notes: true
